<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#DC2626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BNI 商務交流媒合系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Disable double-tap zoom for fast tapping */
    * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    /* Tab active indicator */
    .tab-active { color: #DC2626; border-bottom: 3px solid #DC2626; font-weight: 700; }

    /* Smooth toast */
    #toast { transition: transform 0.3s ease, opacity 0.3s ease; }

    /* Button press feedback */
    button:active { transform: scale(0.97); }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #DC2626; border-radius: 2px; }

    /* Pulse animation for current speaker badge */
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }
    .pulse-red { animation: pulse-red 2s infinite; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen select-none">

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LOGIN SCREEN                                     -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-5 bg-gradient-to-b from-red-50 to-white">
    <div class="w-full max-w-sm">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
          <span class="text-white text-4xl font-black">BNI</span>
        </div>
        <h1 class="text-2xl font-black text-gray-800 leading-tight">BNI 商務交流媒合系統</h1>
        <p class="text-red-500 text-sm font-medium mt-1">長榮66屆 · 商務交流活動</p>
      </div>

      <!-- Form Card -->
      <div class="bg-white rounded-3xl shadow-xl p-6 space-y-6">

        <!-- Name -->
        <div>
          <label class="block text-gray-700 font-bold mb-2 text-base">你的名字</label>
          <input
            id="input-name"
            type="text"
            placeholder="請輸入你的名字"
            maxlength="20"
            autocomplete="name"
            class="w-full border-2 border-gray-200 rounded-2xl px-4 py-4 text-xl font-medium focus:border-red-500 focus:outline-none transition-colors"
          >
        </div>

        <!-- Role -->
        <div>
          <label class="block text-gray-700 font-bold mb-3 text-base">你的身份</label>
          <div class="space-y-2" id="role-options">
            <label id="role-label-member" class="flex items-center gap-3 p-4 rounded-2xl border-2 border-gray-200 cursor-pointer transition-all active:scale-98">
              <input type="radio" name="role" value="長榮會員" class="w-5 h-5 accent-red-600" onchange="updateRoleStyle()">
              <span class="text-gray-700 text-xl font-medium">長榮會員</span>
            </label>
            <label id="role-label-guest" class="flex items-center gap-3 p-4 rounded-2xl border-2 border-gray-200 cursor-pointer transition-all">
              <input type="radio" name="role" value="來賓" class="w-5 h-5 accent-red-600" onchange="updateRoleStyle()">
              <span class="text-gray-700 text-xl font-medium">來賓</span>
            </label>
            <label id="role-label-friend" class="flex items-center gap-3 p-4 rounded-2xl border-2 border-gray-200 cursor-pointer transition-all">
              <input type="radio" name="role" value="親友" class="w-5 h-5 accent-red-600" onchange="updateRoleStyle()">
              <span class="text-gray-700 text-xl font-medium">親友</span>
            </label>
          </div>
        </div>

        <!-- Submit -->
        <button
          id="btn-login"
          onclick="handleLogin()"
          class="w-full bg-red-600 text-white text-xl font-black py-5 rounded-2xl shadow-lg active:bg-red-700 transition-all"
        >
          進入交流系統
        </button>
      </div>

      <p class="text-center text-gray-400 text-xs mt-6">掃描 QR Code 進入 · 不需要帳號密碼</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- MAIN SCREEN                                      -->
  <!-- ═══════════════════════════════════════════════ -->
  <div id="screen-main" class="hidden min-h-screen flex flex-col">

    <!-- Header (sticky) -->
    <header class="bg-red-600 px-4 py-3 flex items-center justify-between shadow-lg sticky top-0 z-20">
      <div class="min-w-0">
        <h1 class="text-white font-black text-lg leading-tight truncate">BNI 商務交流媒合系統</h1>
        <p class="text-red-200 text-xs mt-0.5 truncate" id="header-user">載入中...</p>
      </div>
      <button
        onclick="handleLogout()"
        class="ml-3 shrink-0 text-red-200 text-xs border border-red-400 rounded-xl px-3 py-1.5 active:bg-red-700 transition-colors"
      >
        登出
      </button>
    </header>

    <!-- Tabs (sticky below header) -->
    <nav class="bg-white shadow-sm sticky top-[60px] z-10 flex border-b border-gray-100">
      <button
        id="tab-btn-speaker"
        onclick="switchTab('speaker')"
        class="flex-1 py-3.5 text-center text-gray-500 font-semibold text-base tab-active transition-colors"
      >
        🎤 目前發言者
      </button>
      <button
        id="tab-btn-browse"
        onclick="switchTab('browse')"
        class="flex-1 py-3.5 text-center text-gray-500 font-semibold text-base transition-colors"
      >
        👥 所有來賓
      </button>
    </nav>

    <!-- ── Tab: Current Speaker ── -->
    <div id="tab-speaker" class="flex-1 p-4">
      <div id="speaker-content">
        <!-- Rendered by JS -->
        <div class="text-center py-20 text-gray-400">
          <div class="text-6xl mb-4">🎤</div>
          <p class="text-xl font-semibold">等待發言者...</p>
          <p class="text-sm mt-2">請稍候，管理員將設定目前的發言者</p>
        </div>
      </div>
    </div>

    <!-- ── Tab: Browse All Participants ── -->
    <div id="tab-browse" class="hidden flex-1 flex flex-col">

      <!-- Counter + Search bar (sticky) -->
      <div class="sticky top-[112px] z-10 bg-gray-50 px-4 pt-3 pb-2 space-y-2">
        <div class="bg-white rounded-2xl px-4 py-2.5 flex items-center justify-between shadow-sm border border-gray-100">
          <span class="text-gray-600 text-sm font-medium">已選交流對象</span>
          <span id="counter-badge" class="bg-gray-100 text-gray-700 font-black px-4 py-1 rounded-full text-sm">0 / 3</span>
        </div>
        <input
          id="search-input"
          type="search"
          placeholder="🔍 搜尋姓名或專業..."
          oninput="filterParticipants()"
          class="w-full bg-white border-2 border-gray-200 rounded-2xl px-4 py-3 text-base focus:border-red-500 focus:outline-none transition-colors"
        >
      </div>

      <div id="participants-list" class="flex-1 px-4 pb-6 pt-2 overflow-y-auto">
        <div class="text-center py-16 text-gray-400">載入中...</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TOAST NOTIFICATION                               -->
  <!-- ═══════════════════════════════════════════════ -->
  <div
    id="toast"
    style="transform: translateY(120px); opacity: 0;"
    class="fixed bottom-6 left-4 right-4 max-w-sm mx-auto bg-gray-800 text-white text-center py-3.5 px-5 rounded-2xl shadow-2xl z-50 text-base font-semibold"
  >
    訊息
  </div>

  <script src="app.js"></script>
</body>
</html>
